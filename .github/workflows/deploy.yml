name: CD - Despliegue a Azure

on:
  push:
    branches:
      - main
      - desarrollo-rediseno
  workflow_dispatch: # Permite dispararlo manualmente desde GitHub

env:
  AZURE_CONTAINER_REGISTRY: ucatolicaconiiti
  RESOURCE_GROUP: coniiti

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      # --- DESPLIEGUE DE AUTH SERVICE ---
      - name: Build & Push Auth Service
        run: |
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/auth-service:${{ github.sha }} ./microservices/auth-service
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/auth-service:${{ github.sha }}

      - name: Deploy Auth Service
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: auth-service
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/auth-service:${{ github.sha }}

      # --- DESPLIEGUE DE USERS SERVICE ---
      - name: Build & Push Users Service
        run: |
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/users-service:${{ github.sha }} ./microservices/users-service
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/users-service:${{ github.sha }}

      - name: Deploy Users Service
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: users-service
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/users-service:${{ github.sha }}

      # --- DESPLIEGUE DE AGENDA SERVICE ---
      - name: Build & Push Agenda Service
        run: |
          docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/agenda-service:${{ github.sha }} ./microservices/agenda-service
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/agenda-service:${{ github.sha }}

      - name: Deploy Agenda Service
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: agenda-service
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/agenda-service:${{ github.sha }}
