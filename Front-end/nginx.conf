server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/auth/ {
        proxy_set_header X-Forwarded-Prefix /api/auth;
        rewrite ^/api/auth/?(.*)$ /$1 break;
        proxy_pass http://auth-service;
    }

    location = /api/auth {
        proxy_set_header X-Forwarded-Prefix /api/auth;
        rewrite ^/api/auth$ / break;
        proxy_pass http://auth-service;
    }

    location /api/users/ {
        proxy_set_header X-Forwarded-Prefix /api/users;
        rewrite ^/api/users/?(.*)$ /$1 break;
        proxy_pass http://users-service;
    }

    location = /api/users {
        proxy_set_header X-Forwarded-Prefix /api/users;
        rewrite ^/api/users$ / break;
        proxy_pass http://users-service;
    }

    location /api/committees/ {
        proxy_set_header X-Forwarded-Prefix /api/committees;
        rewrite ^/api/committees/?(.*)$ /$1 break;
        proxy_pass http://users-service;
    }

    location = /api/committees {
        proxy_set_header X-Forwarded-Prefix /api/committees;
        rewrite ^/api/committees$ / break;
        proxy_pass http://users-service;
    }

    location /api/agenda/ {
        proxy_set_header X-Forwarded-Prefix /api/agenda;
        rewrite ^/api/agenda/?(.*)$ /$1 break;
        proxy_pass http://agenda-service;
    }

    location = /api/agenda {
        proxy_set_header X-Forwarded-Prefix /api/agenda;
        rewrite ^/api/agenda$ / break;
        proxy_pass http://agenda-service;
    }

    location /api/notifications/ {
        proxy_set_header X-Forwarded-Prefix /api/notifications;
        rewrite ^/api/notifications/?(.*)$ /$1 break;
        proxy_pass http://notifications-service;
    }

    location = /api/notifications {
        proxy_set_header X-Forwarded-Prefix /api/notifications;
        rewrite ^/api/notifications$ / break;
        proxy_pass http://notifications-service;
    }

    location /api/payments/ {
        proxy_set_header X-Forwarded-Prefix /api/payments;
        rewrite ^/api/payments/?(.*)$ /$1 break;
        proxy_pass http://payments-service;
    }

    location = /api/payments {
        proxy_set_header X-Forwarded-Prefix /api/payments;
        rewrite ^/api/payments$ / break;
        proxy_pass http://payments-service;
    }

    location /api/analytics/ {
        proxy_set_header X-Forwarded-Prefix /api/analytics;
        rewrite ^/api/analytics/?(.*)$ /$1 break;
        proxy_pass http://analytics-service;
    }

    location = /api/analytics {
        proxy_set_header X-Forwarded-Prefix /api/analytics;
        rewrite ^/api/analytics$ / break;
        proxy_pass http://analytics-service;
    }

    location /api/files/ {
        proxy_set_header X-Forwarded-Prefix /api/files;
        rewrite ^/api/files/?(.*)$ /$1 break;
        proxy_pass http://files-service;
    }

    location = /api/files {
        proxy_set_header X-Forwarded-Prefix /api/files;
        rewrite ^/api/files$ / break;
        proxy_pass http://files-service;
    }

    location /api/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
