apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
data:
  MONGO_DB_NAME: "analytics_db"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_USER: "user"
  RABBITMQ_EXCHANGE: "coniiti_events"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: analytics-service:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "40m"
          limits:
            memory: "176Mi"
            cpu: "250m"
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: analytics-service-config
        - secretRef:
            name: analytics-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 15
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
