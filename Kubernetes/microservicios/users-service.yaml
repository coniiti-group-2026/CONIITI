apiVersion: v1
kind: ConfigMap
metadata:
  name: users-service-config
data:
  AUTH_SERVICE_URL: "http://auth-service"
  ENVIRONMENT: "development"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  labels:
    app: users-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
      - name: users-service
        image: users-service:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "40m"
          limits:
            memory: "176Mi"
            cpu: "250m"
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: users-service-config
        - secretRef:
            name: users-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 8
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  type: ClusterIP
  selector:
    app: users-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
