apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  USERS_SERVICE_URL: "http://users-service"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_USER: "user"
  RABBITMQ_EXCHANGE: "coniiti_events"
  ENVIRONMENT: "development"
  FRONTEND_URL: "http://localhost"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "72Mi"
            cpu: "40m"
          limits:
            memory: "192Mi"
            cpu: "250m"
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: auth-service-config
        - secretRef:
            name: auth-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 8
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
