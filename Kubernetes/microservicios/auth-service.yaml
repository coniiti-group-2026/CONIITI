apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  DB_HOST: "auth-db-service"
  DB_PORT: "5432"
  DB_NAME: "auth"
  DB_USER: "admin"
  USERS_SERVICE_URL: "http://users-service"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_USER: "user"
  ENVIRONMENT: "development"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "adminpassword"
  DATABASE_URL: "postgresql://admin:adminpassword@auth-db-service:5432/auth"
  JWT_SECRET_KEY: "change-this-in-production-please"
  INTERNAL_SERVICE_TOKEN: "coniiti-internal-secret-2026"
  RABBITMQ_PASS: "password"
  SMTP_PASSWORD: "opwrhodyrokqyolm"
  SMTP_USER: "coniitiadmin@gmail.com"
  GOOGLE_CLIENT_ID: "AQUI_TU_CLIENT_ID_DE_GOOGLE"
  GOOGLE_CLIENT_SECRET: "AQUI_TU_SECRET_DE_GOOGLE"
  MICROSOFT_TENANT_ID: "d4227148-4930-4f06-8baa-0845ff57e541"
  MICROSOFT_CLIENT_ID: "5502497e-fb2d-41d9-9ada-9d71e7086dd5"
  MICROSOFT_CLIENT_SECRET: "AQUI_TU_SECRET_DE_MICROSOFT"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: auth-service-config
        - secretRef:
            name: auth-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
