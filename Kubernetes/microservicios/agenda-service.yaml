apiVersion: v1
kind: ConfigMap
metadata:
  name: agenda-service-config
data:
  DB_HOST: "agenda-db-service"
  DB_PORT: "5432"
  DB_NAME: "agenda_db"
  DB_USER: "admin"
  RABBITMQ_HOST: "rabbitmq-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: agenda-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "adminpassword"
  DATABASE_URL: "postgresql://admin:adminpassword@agenda-db-service:5432/agenda_db"
  RABBITMQ_USER: "user"
  RABBITMQ_PASS: "password"
  JWT_SECRET_KEY: "change-this-in-production-please"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenda-service
  labels:
    app: agenda-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenda-service
  template:
    metadata:
      labels:
        app: agenda-service
    spec:
      containers:
      - name: agenda-service
        image: agenda-service:latest
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: agenda-service-config
        - secretRef:
            name: agenda-service-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agenda-service
spec:
  type: ClusterIP
  selector:
    app: agenda-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
