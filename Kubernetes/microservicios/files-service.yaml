apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: files-uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce # O ReadWriteMany si tienes almacenamiento compatible (NFS, Azure File)
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: files-service
  labels:
    app: files-service
spec:
  replicas: 1 # Para evitar problemas de concurrencia con ReadWriteOnce en disco local, usar 1 réplica.
  selector:
    matchLabels:
      app: files-service
  template:
    metadata:
      labels:
        app: files-service
    spec:
      containers:
      - name: files-service
        image: files-service:latest
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: files-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: files-service
spec:
  type: ClusterIP
  selector:
    app: files-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
