apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-mongo-local-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-mongo
  labels:
    app: analytics-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-mongo
  template:
    metadata:
      labels:
        app: analytics-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: analytics-mongo-secret
              key: MONGO_PASSWORD
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: analytics-mongo-local-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-mongo-service
spec:
  type: ClusterIP
  selector:
    app: analytics-mongo
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
