apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notifications-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-db-deployment
  labels:
    app: notifications-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-db
  template:
    metadata:
      labels:
        app: notifications-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "adminpassword"
        - name: POSTGRES_DB
          value: "notificationsdb"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: notifications-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-db-service
spec:
  type: ClusterIP
  selector:
    app: notifications-db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
