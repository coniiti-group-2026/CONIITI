services:
  traefik:
    image: traefik:v2.10
    container_name: api-gateway
    command:
      - "--configfile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - coniiti_net

  shared-db:
    image: postgres:16-alpine
    container_name: shared-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-postgres-password}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-default_db}
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - coniiti_net

  analytics-mongo:
    image: mongo:7
    container_name: analytics-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-local-dev-mongo-password}
    volumes:
      - analytics_mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - coniiti_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shared-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-local-dev-rabbitmq-password}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - coniiti_net

  auth-service:
    build: ./microservices/auth-service
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-postgres-password}@shared-db:5432/authdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-me-32-chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-token}
      USERS_SERVICE_URL: http://users-service:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RABBITMQ_HOST: shared-rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-local-dev-rabbitmq-password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coniiti_events}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.local}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CONIITI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost/api/auth/oauth/google/callback}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-http://localhost/api/auth/oauth/microsoft/callback}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - shared-db
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  users-service:
    build: ./microservices/users-service
    container_name: users-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-postgres-password}@shared-db:5432/usersdb
      AUTH_SERVICE_URL: http://auth-service:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-me-32-chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-token}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - shared-db
      - auth-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  agenda-service:
    build: ./microservices/agenda-service
    container_name: agenda-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-postgres-password}@shared-db:5432/agenda_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-me-32-chars}
      RABBITMQ_HOST: shared-rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-local-dev-rabbitmq-password}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - shared-db
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  notifications-service:
    build: ./microservices/notifications-service
    container_name: notifications-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-postgres-password}@shared-db:5432/notificationsdb
      RABBITMQ_HOST: shared-rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-local-dev-rabbitmq-password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coniiti_events}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - shared-db
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  payments-service:
    build: ./microservices/payments-service
    container_name: payments-service
    environment:
      PAYMENTS_DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-postgres-password}@shared-db:5432/paymentsdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-me-32-chars}
      PAYMENT_PROVIDER_MODE: ${PAYMENT_PROVIDER_MODE:-mock}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - shared-db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  analytics-service:
    build: ./microservices/analytics-service
    container_name: analytics-service
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-local-dev-mongo-password}@analytics-mongo:27017/${MONGO_DB_NAME:-analytics_db}?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-analytics_db}
      RABBITMQ_HOST: shared-rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-local-dev-rabbitmq-password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coniiti_events}
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      - analytics-mongo
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - coniiti_net

  files-service:
    build: ./microservices/files-service
    container_name: files-service
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-me-32-chars}
    volumes:
      - files_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 96M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - coniiti_net

  frontend:
    build: ./Front-end
    container_name: frontend
    deploy:
      resources:
        limits:
          memory: 48M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - coniiti_net

networks:
  coniiti_net:
    driver: bridge

volumes:
  shared_postgres_data:
  analytics_mongo_data:
  files_uploads:
