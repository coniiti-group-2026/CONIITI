version: "3.8"

services:
  # ==========================================
  # INFRAESTRUCTURA UNIFICADA (Ahorro Extremo)
  # ==========================================
  traefik:
    image: traefik:v2.10
    container_name: api-gateway
    command:
      - "--configfile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - coniiti_net

  shared-db:
    image: postgres:16-alpine
    container_name: shared-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: default_db
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - coniiti_net

  analytics-mongo:
    image: mongo:7
    container_name: analytics-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - analytics_mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - coniiti_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shared-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - coniiti_net

  # ==========================================
  # MICROSERVICIOS (Optimizados)
  # ==========================================
  auth-service:
    build: ./microservices/auth-service
    container_name: auth-service
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@shared-db:5432/authdb
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - shared-db
    networks:
      - coniiti_net

  users-service:
    build: ./microservices/users-service
    container_name: users-service
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@shared-db:5432/usersdb
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - shared-db
    networks:
      - coniiti_net

  agenda-service:
    build: ./microservices/agenda-service
    container_name: agenda-service
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@shared-db:5432/agenda_db
      - RABBITMQ_HOST=shared-rabbitmq
      - RABBITMQ_USER=user
      - RABBITMQ_PASS=password
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - shared-db
      - rabbitmq
    networks:
      - coniiti_net

  notifications-service:
    build: ./microservices/notifications-service
    container_name: notifications-service
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@shared-db:5432/notificationsdb
      - RABBITMQ_HOST=shared-rabbitmq
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - shared-db
      - rabbitmq
    networks:
      - coniiti_net

  payments-service:
    build: ./microservices/payments-service
    container_name: payments-service
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@shared-db:5432/paymentsdb
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - shared-db
    networks:
      - coniiti_net

  analytics-service:
    build: ./microservices/analytics-service
    container_name: analytics-service
    environment:
      - MONGO_URI=mongodb://admin:adminpassword@analytics-mongo:27017
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - analytics-mongo
    networks:
      - coniiti_net

  files-service:
    build: ./microservices/files-service
    container_name: files-service
    volumes:
      - files_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - coniiti_net

  frontend:
    build: ./Front-end
    container_name: frontend
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - coniiti_net

networks:
  coniiti_net:
    driver: bridge

volumes:
  shared_postgres_data:
  analytics_mongo_data:
  files_uploads:
