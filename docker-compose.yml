version: "3.8"

services:
  # ==========================================
  # API GATEWAY (Traefik)
  # ==========================================
  traefik:
    image: traefik:v2.10
    container_name: api-gateway
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--configfile=/etc/traefik/traefik.yml" # Mantiene compatibilidad
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik:/etc/traefik
    networks:
      - coniiti_net

  # ==========================================
  # BACKEND MONOLÍTICO
  # ==========================================
  backend:
    build: 
      context: ./Back-end
    container_name: backend
    environment:
      - DATABASE_URL=sqlite:///./test.db # Puede actualizarse luego a Postgres
      - SECRET_KEY=supersecreto123
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.service=api-service"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.strip-api.stripprefix.forceSlash=true"
      - "traefik.http.routers.api.middlewares=strip-api"
      - "traefik.http.services.api-service.loadbalancer.server.port=8000"
    networks:
      - coniiti_net

  # ==========================================
  # MENSAJERÍA ASÍNCRONA (RabbitMQ)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shared-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - coniiti_net

  # ==========================================
  # BASES DE DATOS COMPARTIDAS
  # ==========================================
  postgres_shared:
    image: postgres:15-alpine
    container_name: shared-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: coniiti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coniiti_net

  mongodb_analytics:
    image: mongo:6-jammy
    container_name: analytics-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: analytics_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - coniiti_net

  # ==========================================
  # OTROS MICROSERVICIOS
  # ==========================================
  payments-service:
    build:
      context: ./microservices/payments-service
    container_name: payments-service
    env_file:
      - ./microservices/payments-service/.env
    environment:
      - PAYMENTS_DATABASE_URL=postgresql://admin:adminpassword@shared-postgres:5432/coniiti_db
    depends_on:
      - postgres_shared
    networks:
      - coniiti_net

  files-service:
    build:
      context: ./microservices/files-service
    container_name: files-service
    volumes:
      - files_data:/app/uploads
    networks:
      - coniiti_net

  analytics-service:
    build:
      context: ./microservices/analytics-service
    container_name: analytics-service
    environment:
      - MONGO_URI=mongodb://admin:adminpassword@analytics-mongodb:27017
      - RABBITMQ_HOST=shared-rabbitmq
      - RABBITMQ_USER=user
      - RABBITMQ_PASS=password
    depends_on:
      - mongodb_analytics
      - rabbitmq
    networks:
      - coniiti_net

networks:
  coniiti_net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  files_data:
