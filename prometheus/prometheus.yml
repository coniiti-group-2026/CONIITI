global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8000']

  - job_name: 'users-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['users-service:8000']

  - job_name: 'agenda-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['agenda-service:8000']

  - job_name: 'notifications-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notifications-service:8000']

  - job_name: 'payments-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['payments-service:8000']

  - job_name: 'analytics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['analytics-service:8000']

  - job_name: 'files-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['files-service:8000']
